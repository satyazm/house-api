<!DOCTYPE html>

<html>

<head>

    <title>House Price Predictor</title>



    <style>



        body{

            font-family: Arial;

            background:#0f172a;

            color:white;

            display:flex;

            justify-content:center;

            align-items:center;

            height:100vh;

            margin:0;

        }



        .container{

            background:#1e293b;

            padding:40px;

            border-radius:20px;

            width:350px;

            box-shadow:0px 0px 20px rgba(0,0,0,0.3);

        }



        h1{

            text-align:center;

        }



        input{

            width:100%;

            padding:12px;

            margin-top:10px;

            border:none;

            border-radius:10px;

            box-sizing:border-box;

        }



        button{

            width:100%;

            padding:12px;

            margin-top:20px;

            border:none;

            border-radius:10px;

            background:#3b82f6;

            color:white;

            font-size:16px;

            cursor:pointer;

        }



        #result{

            margin-top:20px;

            text-align:center;

            font-size:20px;

        }



    </style>



</head>



<body>



<div class="container">



<h1>House Price Predictor</h1>



<input type="number" id="area" placeholder="Area">



<input type="number" id="bedrooms" placeholder="Bedrooms">



<button onclick="predictPrice()">

Predict Price

</button>



<div id="result"></div>



</div>



<script>



async function predictPrice(){



const area=document.getElementById("area").value;

const bedrooms=document.getElementById("bedrooms").value;



const response=await fetch("/predict",{



method:"POST",



headers:{

"Content-Type":"application/json"

},



body:JSON.stringify({

area:Number(area),

bedrooms:Number(bedrooms)

})



});



const data=await response.json();



document.getElementById("result").innerHTML=

"Predicted Price: "+data.predicted_price;



}



</script>



</body>

</html>
